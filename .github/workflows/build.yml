name: Build Electron App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npx vite build

      - name: Build Electron app
        run: npx electron-builder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-build
          path: dist
