name: Build Electron App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Vite
        run: npm run build

      - name: Build Electron
        run: npx electron-builder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist
